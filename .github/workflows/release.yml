name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: cd Scriptik && bash scripts/bundle.sh

      - name: Create zip
        run: |
          cd Scriptik/build
          ditto -c -k --keepParent Scriptik.app Scriptik.app.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Scriptik/build/Scriptik.app.zip
          generate_release_notes: true
